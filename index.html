<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Anastasia Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #d4af37; text-align: center; box-shadow: 0 0 20px rgba(212,175,55,0.2); width: 320px; }
        input { width: 90%; padding: 12px; margin: 20px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; text-align: center; border-radius: 5px; }
        button { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #result { margin-top: 25px; font-size: 24px; font-weight: bold; color: #fff; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ANASTASIA V4</h1>
        <p>بوابة الربط الملكية</p>
        <input type="text" id="phone" placeholder="222XXXXXXXX">
        <button onclick="getPair()">طلب رمز الربط</button>
        <div id="result"></div>
    </div>

    <script>
        async function getPair() {
            const phone = document.getElementById('phone').value;
            const resDiv = document.getElementById('result');
            if(!phone) return alert("ضع الرقم أولاً");
            resDiv.innerText = "جاري الطلب...";
            try {
                // استبدل الرابط أدناه برابط Render الخاص بك لاحقاً
                const response = await fetch('https://your-bot-link.onrender.com/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: phone })
                });
                const data = await response.json();
                resDiv.innerText = data.code || "خطأ في السيرفر";
            } catch (err) {
                resDiv.innerText = "السيرفر لا يستجيب";
            }
        }
    </script>
</body>
</html>
